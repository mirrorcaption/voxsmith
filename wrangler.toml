name = "voxsmith"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# To bind a custom domain you own, uncomment and edit the pattern below.
# Default deploys (without this block) get a free <name>.<account>.workers.dev URL.
# routes = [
#   { pattern = "your.domain.com", custom_domain = true }
# ]

[ai]
binding = "AI"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true
